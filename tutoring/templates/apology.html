{% extends "layout.html" %}

{% block title %}
    Error
{% endblock %}

{% block main %}
    <img alt="Error" class="img-fluid mx-auto d-block" src="https://uploads.sitepoint.com/wp-content/uploads/2015/12/1450973046wordpress-errors.png" title="Error">
    <h1 class = "text-center text-danger" >{{ message }}</h2> <!-- error message here-->
    <hr class="border border-danger border-2 opacity-50">
    {% if back %}
        <a role="button" class="btn btn-outline-primary btn-large mx-auto" href="{{ back }}">Back</a>
    {% endif %}
    <a role="button" class="btn btn-outline-primary btn-large mx-auto" href="/">Home</a>



{% endblock %}
