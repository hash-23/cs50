{% extends "layout.html" %}

{% block title %}
    Login
{% endblock %}

{% block main %}
    <form action="/login" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" id="username" name="username" placeholder="Username" type="text">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" id="password" name="password" placeholder="Password" type="password">
        </div>
        <button class="btn btn-primary" type="submit">Log In</button>
    </form>
    <p3 class="p3">Forgotten your username or password? <a href="https://mail.google.com/mail/u/0/?fs=1&to=ha4361@student.st-chris.net&tf=cm&su=Tutoring - Forgotten Username/Password">Contact technical support</a></p3>
{% endblock %}
