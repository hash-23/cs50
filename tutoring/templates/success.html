{% extends "layout.html" %}

{% block title %}
    Success
{% endblock %}

{% block main %}
    <img alt="Error" class="img-fluid mx-auto d-block" src="https://www.easy-gst.in/wp-content/uploads/2017/07/success-icon-10.png" title="Success">
    <h1 class = "text-center text-success" >{{ message }}</h2> <!-- success message here-->
    <hr class="border border-success border-2 opacity-50">
    {% if back %}
        <a role="button" class="btn btn-outline-primary btn-large mx-auto" href="{{ back }}">Back</a>
    {% endif %}
    <a role="button" class="btn btn-outline-primary btn-large mx-auto" href="/">Home</a>



{% endblock %}
